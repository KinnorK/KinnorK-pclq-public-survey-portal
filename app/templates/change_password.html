{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}<div class="center-card"><span class="eyebrow">Account Security</span><h1>Set a new password</h1><p>Your temporary password must be replaced before accessing research data.</p>{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}<form method="post" class="stack"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label>New password<input type="password" name="password" minlength="10" required></label><label>Confirm password<input type="password" name="confirm" minlength="10" required></label><button class="button primary" type="submit">Change Password</button></form></div>{% endblock %}
